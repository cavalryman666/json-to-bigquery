<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="45%" stop-color="#f06595"/>
      <stop offset="100%" stop-color="#845ef7"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd43b"/>
      <stop offset="100%" stop-color="#fab005"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4dabf7"/>
      <stop offset="100%" stop-color="#1971c2"/>
    </linearGradient>
    <linearGradient id="bqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69db7c"/>
      <stop offset="100%" stop-color="#2f9e44"/>
    </linearGradient>
    <filter id="shadow1" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bg1)"/>

  <!-- decorative circles -->
  <circle cx="60" cy="60" r="90" fill="#ffffff" opacity="0.08"/>
  <circle cx="950" cy="550" r="120" fill="#ffffff" opacity="0.08"/>
  <circle cx="920" cy="80" r="50" fill="#ffffff" opacity="0.1"/>

  <text x="500" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">APPROACH 1 · FULL LOAD</text>
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="16" fill="#fff5f5" text-anchor="middle" opacity="0.9">json.load() reads the entire file into memory, then batches to BigQuery</text>

  <!-- File icon -->
  <g filter="url(#shadow1)">
    <rect x="70" y="220" width="140" height="170" rx="14" fill="url(#fileGrad)"/>
    <path d="M 70 234 Q 70 220 84 220 L 176 220 L 210 254 L 210 376 Q 210 390 196 390 L 84 390 Q 70 390 70 376 Z" fill="url(#fileGrad)"/>
    <path d="M 176 220 L 176 254 L 210 254 Z" fill="#f08c00"/>
  </g>
  <text x="140" y="315" font-family="monospace" font-size="20" font-weight="700" fill="#7d4e00" text-anchor="middle">.json</text>
  <text x="140" y="425" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Source file</text>

  <!-- Arrow 1 -->
  <path d="M 230 300 L 350 300" stroke="#ffffff" stroke-width="4" marker-end="url(#arrowW1)" stroke-linecap="round"/>
  <defs>
    <marker id="arrowW1" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="290" y="285" font-family="monospace" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">json.load()</text>

  <!-- Memory block -->
  <g filter="url(#shadow1)">
    <rect x="370" y="180" width="230" height="250" rx="16" fill="url(#memGrad)"/>
  </g>
  <text x="485" y="220" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff" text-anchor="middle">MEMORY</text>
  <g fill="#a5d8ff">
    <rect x="390" y="240" width="190" height="24" rx="5"/>
    <rect x="390" y="272" width="190" height="24" rx="5"/>
    <rect x="390" y="304" width="190" height="24" rx="5"/>
    <rect x="390" y="336" width="190" height="24" rx="5"/>
    <rect x="390" y="368" width="190" height="24" rx="5"/>
  </g>
  <text x="485" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Entire file held at once</text>

  <!-- Arrow 2 -->
  <path d="M 620 300 L 740 300" stroke="#ffffff" stroke-width="4" marker-end="url(#arrowW1)" stroke-linecap="round"/>
  <text x="680" y="285" font-family="monospace" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">batch</text>

  <!-- BQ target -->
  <g filter="url(#shadow1)">
    <rect x="760" y="210" width="170" height="190" rx="16" fill="url(#bqGrad)"/>
  </g>
  <text x="845" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">BigQuery</text>
  <text x="845" y="295" font-family="Arial, sans-serif" font-size="30" text-anchor="middle">📊</text>
  <text x="845" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Table</text>

  <!-- Warning banner -->
  <rect x="70" y="500" width="860" height="60" rx="14" fill="#ffffff" opacity="0.92"/>
  <text x="500" y="537" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c92a2a" text-anchor="middle">⚠ Best under ~200MB — beyond that, memory scales linearly and can blow up</text>
</svg>
