<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="50%" stop-color="#20c997"/>
      <stop offset="100%" stop-color="#12b886"/>
    </linearGradient>
    <filter id="shadow3" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bg3)"/>
  <circle cx="950" cy="500" r="110" fill="#ffffff" opacity="0.08"/>
  <circle cx="50" cy="70" r="70" fill="#ffffff" opacity="0.08"/>

  <text x="500" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">APPROACH 3 · JSONL</text>
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="16" fill="#ebfbee" text-anchor="middle" opacity="0.9">Each line is its own JSON object — BigQuery reads it natively</text>

  <!-- Lines of JSONL -->
  <g font-family="monospace" font-size="14" font-weight="600">
    <g filter="url(#shadow3)">
      <rect x="70" y="160" width="330" height="34" rx="8" fill="#ffffff"/>
    </g>
    <text x="85" y="182" fill="#087f5b">{"id": 0, "sku": "SKU-1000"}</text>

    <g filter="url(#shadow3)">
      <rect x="70" y="200" width="330" height="34" rx="8" fill="#ffffff"/>
    </g>
    <text x="85" y="222" fill="#087f5b">{"id": 1, "sku": "SKU-1001"}</text>

    <g filter="url(#shadow3)">
      <rect x="70" y="240" width="330" height="34" rx="8" fill="#ffffff"/>
    </g>
    <text x="85" y="262" fill="#087f5b">{"id": 2, "sku": "SKU-1002"}</text>

    <g filter="url(#shadow3)">
      <rect x="70" y="280" width="330" height="34" rx="8" fill="#fff5f5" stroke="#ff6b6b" stroke-width="3"/>
    </g>
    <text x="85" y="302" fill="#c92a2a">{"id": 999, "qty": }  ← broken</text>

    <g filter="url(#shadow3)">
      <rect x="70" y="320" width="330" height="34" rx="8" fill="#ffffff"/>
    </g>
    <text x="85" y="342" fill="#087f5b">{"id": 3, "sku": "SKU-1003"}</text>
  </g>

  <!-- Split arrows -->
  <path d="M 410 297 L 500 220" stroke="#ff6b6b" stroke-width="4" marker-end="url(#arrowR3)" stroke-linecap="round"/>
  <path d="M 410 297 L 500 380" stroke="#ffd43b" stroke-width="4" marker-end="url(#arrowY3)" stroke-linecap="round"/>
  <defs>
    <marker id="arrowR3" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowY3" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#ffd43b"/>
    </marker>
  </defs>

  <!-- dead letter box -->
  <g filter="url(#shadow3)">
    <rect x="510" y="160" width="190" height="110" rx="14" fill="#ff6b6b"/>
  </g>
  <text x="605" y="205" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">dead_letters.log</text>
  <text x="605" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#fff5f5" text-anchor="middle">bad line logged,</text>
  <text x="605" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#fff5f5" text-anchor="middle">load continues</text>

  <!-- good rows to BQ -->
  <g filter="url(#shadow3)">
    <rect x="510" y="340" width="190" height="110" rx="14" fill="#ffd43b"/>
  </g>
  <text x="605" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#5c3d00" text-anchor="middle">Good rows</text>
  <text x="605" y="415" font-family="Arial, sans-serif" font-size="26" text-anchor="middle">✅</text>

  <path d="M 710 395 L 800 340" stroke="#ffd43b" stroke-width="4" marker-end="url(#arrowY3)" stroke-linecap="round"/>

  <!-- BQ target -->
  <g filter="url(#shadow3)">
    <rect x="810" y="270" width="150" height="150" rx="16" fill="#087f5b"/>
  </g>
  <text x="885" y="335" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">BigQuery</text>
  <text x="885" y="365" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">📊</text>

  <!-- Warning banner -->
  <rect x="70" y="500" width="890" height="60" rx="14" fill="#ffffff" opacity="0.92"/>
  <text x="515" y="537" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c92a2a" text-anchor="middle">⚠ Without a try/except per line, one bad row can fail the whole load</text>
</svg>
